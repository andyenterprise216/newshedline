name: 毎朝の見出し更新

on:
  schedule:
    # UTC 22:00 = 日本時間 翌朝 7:00 (GitHubの仕様で数分〜30分ほど遅れることがあります)
    - cron: "47 21 * * *"
  workflow_dispatch: {}   # Actionsタブから手動実行もできます

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: 見出しを収集してページを生成
        run: python3 fetch_headlines.py

      - name: GitHub Pages を設定
        uses: actions/configure-pages@v5

      - name: 生成したページをアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: GitHub Pages へ公開
        id: deployment
        uses: actions/deploy-pages@v4
